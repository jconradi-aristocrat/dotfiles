# ======================================================
# TMUX MODERN DEV CONFIG (plugin-free, tmux 3.6+)
# ======================================================

##### PREFIX KEY #####

unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind C-a last-window               # double-tap prefix → toggle last window

##### PERFORMANCE / TERMINAL #####

set -g escape-time 0
set -g history-limit 100000
set -g focus-events on             # nvim autoread + status redraw
setw -g aggressive-resize on
set -g detach-on-destroy off       # switch to other session if current dies

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-overrides ",*:RGB"
set -ga terminal-overrides ",*:Smulx=\\E[4::%p1%dm"
set -ga terminal-overrides ",*:Setulc=\\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
# extended-keys (CSI u) — DISABLED. Breaks Shift+Enter in Claude CLI and similar TUIs.
# Re-enable only if you specifically need Ctrl+Shift+letter bindings in nvim:
#   set -s extended-keys on
#   set -as terminal-features ',*:extkeys'
set -g allow-passthrough on
set -g set-clipboard on            # native OSC52

##### WINDOWS #####

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S / #W"
set -g monitor-activity on
set -g visual-activity off

##### MOUSE #####

set -g mouse on

##### VIM PANE NAVIGATION #####

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### PANE SPLITS (preserve cwd) #####

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"

##### PANE RESIZING #####

bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

##### WINDOW NAVIGATION #####

bind -n M-h previous-window
bind -n M-l next-window
bind -r [ swap-window -t -1 \; previous-window
bind -r ] swap-window -t +1 \; next-window
bind Tab switch-client -l

##### COPY MODE (vi + system clipboard) #####

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y                     send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter                 send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane     send -X copy-pipe-and-cancel "pbcopy"

##### SESSION SWITCHER #####

bind-key S choose-tree -Zs

##### POPUP SCRATCH SHELL + CLAUDE #####

bind -n M-Enter display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Floating scratch Claude — persistent session that toggles
bind C display-popup -E -w 90% -h 90% \
  "tmux attach -t scratch-claude || tmux new -s scratch-claude 'claude'"

##### CLAUDE AGENT GRID (4-pane tiled) #####

bind A new-window -n agents \; \
       send-keys 'claude' Enter \; \
       split-window -h -c "#{pane_current_path}" \; send-keys 'claude' Enter \; \
       split-window -v -c "#{pane_current_path}" \; send-keys 'claude' Enter \; \
       select-pane -t 0 \; \
       split-window -v -c "#{pane_current_path}" \; send-keys 'claude' Enter \; \
       select-layout tiled

##### CLEANUP / RELOAD #####

bind r source-file ~/.tmux.conf \; display "tmux config reloaded"
bind R refresh-client
bind X kill-window
bind Q kill-session

##### STATUS BAR #####

set -g status-position top
set -g status-interval 5
set -g display-time 2000
set -g status-left-length 40
set -g status-right-length 100
set -g status-style bg=default,fg=white
set -g status-left  "#[fg=cyan,bold] #S #[fg=white]│ "
set -g status-right "#[fg=yellow]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=white]│ #[fg=cyan]%H:%M "
set -g window-status-current-format "#[fg=black,bg=cyan,bold] #I:#W "
set -g window-status-format         "#[fg=white] #I:#W "

##### COLORS #####

set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour39
