# BEGIN catppuccin-mocha
# Flavor: Mocha — regenerated by `catppuccin` switcher.
# DO NOT hand-edit between BEGIN/END; run `catppuccin <flavor>` instead.
theme:
  activeBorderColor:
    - '#cba6f7'
    - bold
  inactiveBorderColor:
    - '#a6adc8'
  searchingActiveBorderColor:
    - '#f9e2af'
  optionsTextColor:
    - '#89b4fa'
  selectedLineBgColor:
    - '#313244'
  inactiveViewSelectedLineBgColor:
    - '#6c7086'
  cherryPickedCommitFgColor:
    - '#cba6f7'
  cherryPickedCommitBgColor:
    - '#45475a'
  markedBaseCommitFgColor:
    - '#89b4fa'
  markedBaseCommitBgColor:
    - '#f9e2af'
  unstagedChangesColor:
    - '#f38ba8'
  defaultFgColor:
    - '#cdd6f4'
authorColors:
  '*': '#b4befe'
# END catppuccin-mocha

# ─── UI ─────────────────────────────────────────────────────
gui:
  # Nerd Fonts v3 — Ghostty + JetBrainsMono Nerd Font have all glyphs.
  nerdFontsVersion: "3"
  showIcons: true
  showFileIcons: true
  showRandomTip: false
  showCommandLog: true
  showBottomLine: true
  showPanelJumps: true
  showBranchCommitHash: false
  experimentalShowBranchHeads: true
  border: rounded
  # Side-by-side diff when terminal is wide; lazygit auto-picks.
  splitDiff: auto
  # Commit-message line-length guidance.
  commitLength:
    show: true
  scrollHeight: 4
  scrollPastBottom: true
  scrollOffMargin: 4
  mouseEvents: true
  skipDiscardChangeWarning: false
  skipStashWarning: true
  skipNoStagedFilesWarning: false
  skipRewordInEditorWarning: false
  showRootItemInFileTree: true
  expandFocusedSidePanel: false
  expandAllSidePanels: false
  filterMode: substring
  animateExplosion: true
  screenMode: normal
# ─── GIT ────────────────────────────────────────────────────
git:
  # Pagers — list, lazygit uses pagers[0]. Switch the active pager from a
  # shell with `lgp sbs|unified|fancy` (functions.zsh) — that yq-reorders
  # this list in place; restart lazygit to pick it up.
  # `useConfig: true` lets each pager read your ~/.gitconfig features
  # (mocha, decorations) so all themes flow through.
  pagers:
    # delta — SIDE-BY-SIDE (default)
    - colorArg: always
      pager: delta --paging=never --features="catppuccin-mocha decorations merge-symbols side-by-side"
      useConfig: true
    # delta — UNIFIED (inline)
    - colorArg: always
      pager: delta --paging=never --features="catppuccin-mocha decorations merge-symbols unified"
      useConfig: true
    # diff-so-fancy — pass-through filter; relies on git emitting color.
    - colorArg: always
      pager: diff-so-fancy
      useConfig: false
  commit:
    signOff: false
    autoWrapCommitMessage: true
    autoWrapWidth: 72
  merging:
    manualCommit: false
    args: ""
  mainBranches:
    - main
    - master
    - develop
  skipHookPrefix: WIP
  autoFetch: true
  autoRefresh: true
  fetchAll: true
  autoStageResolvedConflicts: true
  branchLogCmd: git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --
  allBranchesLogCmds:
    - git log --graph --all --color=always --abbrev-commit --decorate --date=relative --pretty=medium
  ignoreWhitespaceInDiffView: false
  diffContextSize: 5
  renameSimilarityThreshold: 50
  overrideGpg: false
  disableForcePushing: false
  parseEmoji: true
  log:
    order: topo-order
    showGraph: always
    showWholeGraph: false
  localBranchSortOrder: date
  remoteBranchSortOrder: date
  truncateCopiedCommitHashesTo: 12
# ─── OS / EDITOR ────────────────────────────────────────────
os:
  editPreset: nvim
  edit: 'nvim {{filename}}'
  editAtLine: 'nvim +{{line}} {{filename}}'
  editAtLineAndWait: 'nvim +{{line}} {{filename}}'
  open: 'open {{filename}}'
  openLink: 'open {{link}}'
# ─── REFRESH ────────────────────────────────────────────────
refresher:
  refreshInterval: 10
  fetchInterval: 60
# ─── TOP-LEVEL ──────────────────────────────────────────────
# topgrade owns upgrades; mute lazygit's own update prompt.
update:
  method: never
  days: 14
confirmOnQuit: false
quitOnTopLevelReturn: false
disableStartupPopups: true
notARepository: skip
promptToReturnFromSubprocess: false
# ─── KEYBIND TWEAKS ─────────────────────────────────────────
keybinding:
  universal:
    quit: 'q'
    quit-alt1: '<c-c>'
    return: '<esc>'
    togglePanel: '<tab>'
    nextItem: 'j'
    prevItem: 'k'
    nextPage: ','
    prevPage: '.'
    gotoTop: 'g'
    gotoBottom: 'G'
    edit: 'e'
    openFile: 'o'
    refresh: 'R'
    nextScreenMode: '+'
    prevScreenMode: '_'
    undo: 'z'
    redo: '<c-z>'
    filteringMenu: '<c-s>'
    diffingMenu: 'W'
    copyToClipboard: '<c-o>'
    submitEditorText: '<enter>'
    extrasMenu: '@'
    toggleWhitespaceInDiffView: '<c-w>'
    increaseContextInDiffView: '}'
    decreaseContextInDiffView: '{'
# ─── CUSTOM COMMANDS ────────────────────────────────────────
# Small, productivity-focused. All discoverable via `?` in their panel.
customCommands:
  # Files panel: `C` → conventional-commits prefix picker + scope + subject.
  - key: 'C'
    context: 'files'
    description: 'Conventional commit (prefix picker)'
    prompts:
      - type: 'menu'
        title: 'Type'
        options:
          - {name: 'feat', value: 'feat'}
          - {name: 'fix', value: 'fix'}
          - {name: 'docs', value: 'docs'}
          - {name: 'style', value: 'style'}
          - {name: 'refactor', value: 'refactor'}
          - {name: 'test', value: 'test'}
          - {name: 'chore', value: 'chore'}
          - {name: 'perf', value: 'perf'}
          - {name: 'ci', value: 'ci'}
          - {name: 'build', value: 'build'}
          - {name: 'revert', value: 'revert'}
      - type: 'input'
        title: 'Scope (optional, blank to skip)'
        key: 'Scope'
      - type: 'input'
        title: 'Subject'
        key: 'Subject'
    command: >-
      git commit -m "{{ index .PromptResponses 0 }}{{ if .PromptResponses.Scope }}({{ .PromptResponses.Scope }}){{ end }}: {{ .PromptResponses.Subject }}"
  # Branches: `n` → checkout new branch from the current.
  - key: 'n'
    context: 'localBranches'
    description: 'Checkout new branch from current'
    prompts:
      - type: 'input'
        title: 'Branch name'
        key: 'Name'
    command: 'git checkout -b "{{.PromptResponses.Name}}"'
  # Branches: `D` → force-delete selected branch (confirm).
  - key: 'D'
    context: 'localBranches'
    description: 'Force-delete branch'
    prompts:
      - type: 'confirm'
        title: 'Force-delete {{.SelectedLocalBranch.Name}}?'
    command: 'git branch -D {{.SelectedLocalBranch.Name}}'
  # Commits: `F` → fixup HEAD into selected commit, autosquash-rebase.
  - key: 'F'
    context: 'commits'
    description: 'Fixup HEAD → selected commit, autosquash'
    command: 'git commit --fixup={{.SelectedLocalCommit.Sha}} && GIT_SEQUENCE_EDITOR=: git rebase -i --autosquash {{.SelectedLocalCommit.Sha}}^'
    loadingText: 'Squashing…'
  # Stash: `S` → stash including untracked.
  - key: 'S'
    context: 'stash'
    description: 'Stash including untracked files'
    prompts:
      - type: 'input'
        title: 'Stash message'
        key: 'Msg'
    command: 'git stash push -u -m "{{.PromptResponses.Msg}}"'
  # Files: `A` → toggle assume-unchanged on highlighted file.
  - key: 'A'
    context: 'files'
    description: 'Toggle assume-unchanged on file'
    command: |
      sh -c '
        if git ls-files -v {{.SelectedFile.Name}} | grep -q "^h "; then
          git update-index --no-assume-unchanged "{{.SelectedFile.Name}}"
        else
          git update-index --assume-unchanged "{{.SelectedFile.Name}}"
        fi
      '
  # Global: `T` → open repo in browser via gh.
  - key: 'T'
    context: 'global'
    description: 'Open repo in browser (gh repo view --web)'
    command: 'gh repo view --web'
  # Global: `P` → create PR via gh.
  - key: 'P'
    context: 'global'
    description: 'Create pull request (gh pr create --web)'
    command: 'gh pr create --web'
